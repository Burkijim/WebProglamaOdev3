<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let a = 0;
      let b = 1;
      let sayac = 1;

      while (sayac <= 20) {
        document.write(a + "<br>");

        let toplam = a + b;
        a = b;
        b = toplam;

        sayac++;
      }
    </script>
  </body>
